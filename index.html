<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Things A Reboot Won't Fix</title>
    <style>
        /* Meyer reset (public domain) — trimmed to what this page uses */
        html, body, div, span, h1, h2, h3, h4, h5, h6, p, a, article, header, main, footer {
            margin: 0; padding: 0; border: 0; font-size: 100%; font: inherit; vertical-align: baseline;
        }
        article, header, footer, main { display: block; }
        body { line-height: 1; }

        /* Self-hosted Futura LT (headings) + Garamond Premier Pro (body),
           same subsets used across the practice's sites. */
        @font-face {
            font-family: 'Futura';
            src: url("fonts/subset-FuturaLT-Heavy.woff2") format("woff2"),
                 url("fonts/subset-FuturaLT-Heavy.woff") format("woff");
            font-weight: 900;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Garamond';
            src: url("fonts/subset-GaramondPremrPro.woff2") format("woff2"),
                 url("fonts/subset-GaramondPremrPro.woff") format("woff");
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            margin: 0.5em auto;
            max-width: 60em;
            padding: 0 1em;
            font-size: 18pt;
            line-height: 130%;
            font-family: Garamond, Baskerville, "Baskerville Old Face", "Hoefler Text", "Times New Roman", serif;
        }
        p { max-width: 35em; padding-bottom: 0.5em; }
        h1 {
            font-family: Futura, "Trebuchet MS", Arial, sans-serif;
            font-weight: 700;
            font-size: 4em;
            line-height: 1.1em;
            text-transform: uppercase;
            padding: 0.5em 0;
        }
        @media (max-width: 600px) { h1 { font-size: 2.5em; } }
        @media (max-width: 400px) { h1 { font-size: 2em; } }
        a { color: black; }
    </style>
</head>
<body>
    <main>
        <article>
            <h1>Things A Reboot Won't Fix</h1>
            <p>
                Things a reboot won&rsquo;t fix is the dormant design practice of
                <a href="https://performativenuance.online">Ada Cable</a>.
            </p>
            <p>
                This site exists as a placeholder for when she begins talking about
                that side of her work again.
            </p>
        </article>
    </main>
</body>
</html>
